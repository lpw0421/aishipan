# ============================================
# AI 食安系统 — Nginx 配置 (Ubuntu)
# 文件位置：/etc/nginx/sites-available/aishipan.com
# ============================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name aishipan.com www.aishipan.com;

    # Let's Encrypt 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name aishipan.com www.aishipan.com;

    # SSL 证书（certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/aishipan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aishipan.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # 上传大小限制
    client_max_body_size 20M;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # 静态文件（前端打包产物，Nginx 直出，不走 Node）
    root /opt/aishipan/client/dist;
    index index.html;

    # 静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + 上传文件 → 转发给 Node
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback：非 API、非静态文件的请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
