# AI 食安 - 生产环境 Nginx 配置（HTTPS）
# 存放路径：/etc/nginx/sites-available/ai-shipan
#
# ┌─────────────────────────────────────────────┐
# │ 部署步骤：                                   │
# │ 1. 替换 your-domain.com 为实际域名           │
# │ 2. 先只启用 80 端口 server 块（注释 SSL 块） │
# │ 3. 运行 certbot 获取证书                     │
# │ 4. 取消注释 SSL 块，重载 Nginx               │
# └─────────────────────────────────────────────┘

# ========== HTTP → HTTPS 重定向 ==========
server {
    listen 80;
    server_name your-domain.com;  # 替换为实际域名

    # Let's Encrypt 验证目录
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ========== HTTPS 主站 ==========
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为实际域名

    # ---- SSL 证书（certbot 自动填入）----
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ---- SSL 安全配置 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ---- 前端静态文件 ----
    root /var/www/ai-shipan/client/dist;
    index index.html;

    # 静态资源强缓存（JS/CSS 文件名含 hash，30天）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        client_max_body_size 10m;

        # 超时设置（AI 审核可能较慢）
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
